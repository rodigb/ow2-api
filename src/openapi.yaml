openapi: 3.0.3
info:
  title: OW2 API
  version: 1.0.0
  description: API for Overwatch 2 heroes and authentication.

servers:
  - url: http://localhost:5000

paths:
  /:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        "200":
          description: API is running
          content:
            text/plain:
              schema:
                type: string
                example: API is running 🚀

  /login:
    post:
      tags:
        - Auth
      summary: Log in and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"
        "500":
          description: Server/JWT configuration error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthErrorResponse"

  /heroes:
    get:
      tags:
        - Heroes
      summary: Get heroes (optionally filter by role and/or name)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          required: false
          schema:
            type: string
          description: Filter by exact role value (case-insensitive)
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filter heroes by partial name match (case-insensitive)
      responses:
        "200":
          description: List of heroes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hero"
        "401":
          description: Missing/invalid/expired JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /heroes/{id}:
    get:
      tags:
        - Heroes
      summary: Get a hero by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hero found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hero"
        "401":
          description: Missing/invalid/expired JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Hero not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /heroes/addHero:
    post:
      tags:
        - Heroes
      summary: Add a new hero (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewHeroRequest"
      responses:
        "201":
          description: Hero created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hero"
        "400":
          description: Invalid hero data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Health:
      type: object
      properties:
        hp:
          type: integer
        armor:
          type: integer
        shields:
          type: integer
        total:
          type: integer
      required:
        - hp
        - armor
        - shields
        - total

    Hero:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        health:
          $ref: "#/components/schemas/Health"
        abilities:
          type: array
          items:
            type: string
        ultimate:
          type: string
        releaseDate:
          type: string
          format: date
      required:
        - id
        - name
        - role
        - health
        - abilities
        - ultimate
        - releaseDate

    NewHeroRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        health:
          $ref: "#/components/schemas/Health"
        abilities:
          type: array
          items:
            type: string
        ultimate:
          type: string
        releaseDate:
          type: string
          format: date
      required:
        - name
        - role
        - health
        - abilities
        - ultimate
        - releaseDate

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginSuccessData:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        token:
          type: string
      required:
        - userId
        - username
        - email
        - token

    LoginSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/LoginSuccessData"
      required:
        - success
        - data

    AuthErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
      required:
        - message
        - errors

    ServerErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: object
          additionalProperties: true
      required:
        - message
        - error
